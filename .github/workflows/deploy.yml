name: Deploy

on:
  push:
    branches: [main]

# Prevent concurrent deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

# SR-002: OIDC federation for AWS auth
permissions:
  id-token: write
  contents: read

jobs:
  # Run the full CI pipeline first
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build

      # SR-002: OIDC authentication, no long-lived keys
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3 and invalidate CloudFront
        env:
          VOCAL_VISUALIZER_S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          VOCAL_VISUALIZER_CF_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: bash scripts/deploy.sh

      - name: Verify deployment
        env:
          CLOUDFRONT_DOMAIN: ${{ secrets.CLOUDFRONT_DOMAIN }}
        run: |
          echo "Waiting for CloudFront propagation..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${CLOUDFRONT_DOMAIN}/")
          if [ "$STATUS" -eq 200 ]; then
            echo "Deployment verified: HTTP $STATUS"
          else
            echo "WARNING: Received HTTP $STATUS (may need more propagation time)"
          fi
