name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'promote' to confirm production deployment"
        required: true
        type: string

# Prevent concurrent production deployments
concurrency:
  group: deploy-production
  cancel-in-progress: false

# SR-002: OIDC federation for AWS auth
permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: inputs.confirm != 'promote'
        run: |
          echo "ERROR: You must type 'promote' to confirm production deployment."
          echo "Received: '${{ inputs.confirm }}'"
          exit 1

  ci:
    needs: validate
    uses: ./.github/workflows/ci.yml

  terraform:
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    outputs:
      s3_bucket: ${{ steps.tf-outputs.outputs.s3_bucket }}
      cloudfront_id: ${{ steps.tf-outputs.outputs.cloudfront_id }}
      cloudfront_domain: ${{ steps.tf-outputs.outputs.cloudfront_domain }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"
          terraform_wrapper: false

      # SR-002: OIDC authentication, no long-lived keys
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init (prod)
        working-directory: infra
        run: terraform init -backend-config="key=prod/terraform.tfstate"

      - name: Terraform Plan (prod)
        working-directory: infra
        run: terraform plan -var-file=envs/prod.tfvars -out=prod.tfplan

      - name: Terraform Apply (prod)
        working-directory: infra
        run: terraform apply prod.tfplan

      - name: Export Terraform outputs
        id: tf-outputs
        working-directory: infra
        run: |
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain=$(terraform output -raw cloudfront_domain_name)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build

      # SR-002: OIDC authentication, no long-lived keys
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3 and invalidate CloudFront
        env:
          VOCAL_VISUALIZER_S3_BUCKET: ${{ needs.terraform.outputs.s3_bucket }}
          VOCAL_VISUALIZER_CF_DISTRIBUTION_ID: ${{ needs.terraform.outputs.cloudfront_id }}
        run: bash scripts/deploy.sh

      - name: Verify deployment
        env:
          CLOUDFRONT_DOMAIN: ${{ needs.terraform.outputs.cloudfront_domain }}
        run: |
          echo "Waiting for CloudFront propagation..."
          sleep 10
          # Strip https:// prefix for curl
          DOMAIN="${CLOUDFRONT_DOMAIN#https://}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${DOMAIN}/")
          if [ "$STATUS" -eq 200 ]; then
            echo "Production deployment verified: HTTP $STATUS"
          else
            echo "WARNING: Received HTTP $STATUS (may need more propagation time)"
          fi
