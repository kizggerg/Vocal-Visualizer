name: Agent Run

# Trigger manually from GitHub UI or API, or on schedule
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Task for the agent (e.g., 'Continue working on the current SDLC phase')"
        required: true
        type: string
      branch:
        description: "Branch to work on (leave empty to auto-detect from CURRENT_STATE.md)"
        required: false
        type: string

jobs:
  agent-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write  # Required by claude-code-action for OIDC authentication
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          fetch-depth: 0

      - name: Run Claude Code Agent
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            If docs/gates/CURRENT_STATE.md exists, read it to understand where we are in the SDLC.
            If docs/architecture/async-execution-model.md exists, read it for the session protocol.
            If either file is missing, proceed with the task directly.
            Then: ${{ inputs.prompt }}
